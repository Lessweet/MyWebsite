<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VibeUX</title>
<link href="favicon.png?v=18" rel="icon" type="image/png"/>
<link href="favicon.png?v=18" rel="shortcut icon"/>
<link href="apple-touch-icon.png?v=15" rel="apple-touch-icon"/>
    <link href="style.css?v=135" rel="stylesheet"/>
<!-- Kaushan Script:hero 强调词暂时改回无衬线,字体加载先注释掉,恢复手写体时一并放开
<link href="https://fonts.gstatic.com" rel="preconnect" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap" rel="stylesheet"/> -->
<link href="writing/writing.css?v=373" rel="stylesheet"/>
<!-- 提前加载,使顶部导航能在首次绘制前同步注入,避免空 header 闪烁(React 迁移后的原生 boot 层) -->
<script src="nav-boot.js?v=2"></script>
</head>
<!-- 复用 design-page 的 pillar 布局(左侧二级导航 + 右侧分模块),Writing 与 Design 页对称 -->
<!-- theme-dark / menu-dark 已摘除:Blog 改白底样式(2026-07-21),背景 --gray-50 由 writing.css 的 body.blog-page 给 -->
<body class="home-v2 design-page no-banner menu-hidden blog-page">
<header class="header home-nav" data-active="writing" id="site-nav"></header>
<script>
        initSiteNav();
        applySiteTheme();   /* 首绘前应用记忆的深/浅色主题(nav-boot.js) */
        /* 首屏同步设定 --design-menu-top = 顶栏实际高度,避免刷新时内容用兜底值 72px
           先渲染、随后 JS 改成真实值导致的「上跳」 */
        (function () {
            var h = document.getElementById('site-nav');
            if (h) document.documentElement.style.setProperty('--design-menu-top', h.offsetHeight + 'px');
        })();
    </script>
<span id="top"></span>
<main class="design-layout" id="app"></main>
<script src="/src/pages/blog/main.tsx" type="module"></script>
</body>
</html>
