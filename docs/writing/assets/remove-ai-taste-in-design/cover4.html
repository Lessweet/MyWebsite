<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{margin:0;padding:0;box-sizing:border-box;}
.wrap{position:fixed;inset:0;overflow:hidden;background:#e8ecc8;}
#sh{position:absolute;inset:0;width:100%;height:100%;display:block;}
.grain{position:absolute;inset:0;opacity:.10;mix-blend-mode:overlay;pointer-events:none;}
.stage{position:absolute;left:50%;top:50%;width:1080px;height:460px;transform:translate(-50%,-50%);transform-origin:center center;}
.card{position:absolute;transform:translate(-50%,-50%);background:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.08);overflow:hidden;}
.card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .2s ease;}
.c1{left:14%;top:75%;}
.c2{left:50%;top:50%;z-index:2;}
.c3{left:87%;top:20%;}
</style></head><body>
<div class="wrap">
<canvas id="sh"></canvas>
<svg class="grain"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>
<div class="stage" id="stage">
  <div class="card c1" style="width:400px;height:203px">
    <img src="cover4-img/img1.webp" style="object-position:center;opacity:1">
    <img src="cover4-img/img2.webp" style="object-position:center;opacity:0">
    <img src="cover4-img/img3.webp" style="object-position:center;opacity:0">
    <img src="cover4-img/img4.webp" style="object-position:center;opacity:0">
  </div>
  <div class="card c2" style="width:440px;height:329px">
    <img src="cover4-img/img5.webp" style="object-position:center;opacity:1">
    <img src="cover4-img/img6.webp" style="object-position:center;opacity:0">
    <img src="cover4-img/img7.webp" style="object-position:right center;opacity:0">
  </div>
  <div class="card c3" style="width:400px;height:222px">
    <img src="cover4-img/img8.webp" style="object-position:center;opacity:1">
    <img src="cover4-img/img9.webp" style="object-position:center 30%;opacity:0">
  </div>
</div>
</div>
<script>
// stage 按高度等比缩放居中：16:9 iframe 里等价于对 1080×460 源做居中裁切
(function(){function fit(){var s=(window.innerHeight||460)/460;
  document.getElementById('stage').style.transform='translate(-50%,-50%) scale('+s.toFixed(4)+')';}
fit();addEventListener('resize',fit);})();
</script>
<script>
// 三卡各自轮播：停留 DWELL、交叉淡入 .7s，相位各错开 1.1s，避免同时切换
var FREEZE=null;
if(FREEZE==null)(function(){
  var DWELL=500,STAGGER=170;
  document.querySelectorAll('.card').forEach(function(card,ci){
    var imgs=card.querySelectorAll('img');if(imgs.length<2)return;
    var cur=0;
    setTimeout(function(){setInterval(function(){
      var next=(cur+1)%imgs.length;
      imgs[cur].style.opacity=0;imgs[next].style.opacity=1;cur=next;
    },DWELL);},STAGGER*ci);
  });
})();
</script>
<script>
// ===== heatmap 背景（同 cover3：PAL2 微软黄蓝，design-gallery 实验七移植）=====
(function(){
  var FW=180,FH=95;
  var cv=document.getElementById('sh');
  var ctx2=cv.getContext('2d');
  var field=document.createElement('canvas');field.width=FW;field.height=FH;
  var fctx=field.getContext('2d');
  var img=fctx.createImageData(FW,FH);
  var hp={"stops":["#8f9df0","#aab8f5","#e8ecc8","#ffd83d","#ffc61a"],"hot":"#fff9c0","iso":0.71,"width":0.06,"glow":0.9,"warp":1.56,"dens":0.66,"speed":2.8,"seed":251861885,"t0":69.8};
  var stops=hp.stops,hotc=hp.hot;
  var iso=hp.iso,iw=hp.width,glow=hp.glow,warp=hp.warp,dens=hp.dens,speed=hp.speed,hseed=hp.seed,T0=hp.t0;
  var hex=function(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];};
  var cols=stops.map(hex),lut=new Float32Array(256*3),ns=cols.length-1;
  for(var i=0;i<256;i++){var f=i/255*ns,k=Math.min(ns-1,f|0),tt=f-k,a=cols[k],bb=cols[k+1];
    lut[i*3]=a[0]+(bb[0]-a[0])*tt;lut[i*3+1]=a[1]+(bb[1]-a[1])*tt;lut[i*3+2]=a[2]+(bb[2]-a[2])*tt;}
  var hot=hex(hotc);
  function hash(ix,iy){var n2=Math.imul(ix,374761393)+Math.imul(iy,668265263)+Math.imul(hseed,1440662683)|0;
    n2=Math.imul(n2^(n2>>>13),1274126177);n2=n2^(n2>>>16);return (n2>>>0)/4294967296;}
  function noise(x,y){var ix=Math.floor(x),iy=Math.floor(y);var fx=x-ix,fy=y-iy;
    var ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy);
    var a=hash(ix,iy),b=hash(ix+1,iy),c=hash(ix,iy+1),d=hash(ix+1,iy+1);
    return a+(b-a)*ux+(c-a)*uy+(a-b-c+d)*ux*uy;}
  function fbm(x,y){var v=0,a=0.55,nx;for(var i=0;i<3;i++){v+=a*noise(x,y);nx=1.6*x+1.2*y;y=-1.2*x+1.6*y;x=nx;a*=0.5;}return v/0.9625;}
  function render(tv){var d=img.data,t=tv*0.05,i=0;
    for(var y=0;y<FH;y++){var py=(y-FH/2)/FH*dens;
      for(var x=0;x<FW;x++,i+=4){var px=(x-FW/2)/FH*dens;
        var w1=fbm(px+0.7*t,py+0.4*t);
        var w2=fbm(px-0.5*t+5.2,py-0.6*t+1.3);
        var h=fbm(px+warp*w1+0.3*t,py+warp*w2+0.2*t);
        h=h<0?0:h>1?1:h;
        var k=((h*255)|0)*3;
        var cr=lut[k],cg=lut[k+1],cb=lut[k+2];
        var dg=(h-iso)/iw,g=Math.exp(-dg*dg)*glow;if(g>1)g=1;
        cr+=(hot[0]-cr)*g;cg+=(hot[1]-cg)*g;cb+=(hot[2]-cb)*g;
        d[i]=cr;d[i+1]=cg;d[i+2]=cb;d[i+3]=255;}}
    fctx.putImageData(img,0,0);blit();}
  function blit(){var dpr=Math.min(devicePixelRatio||1,2);
    var w=cv.clientWidth*dpr,h=cv.clientHeight*dpr;if(!w||!h)return;
    if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;}
    ctx2.imageSmoothingEnabled=true;ctx2.imageSmoothingQuality='high';
    ctx2.drawImage(field,0,0,w,h);}
  if(FREEZE!=null){
    render(FREEZE);
    new ResizeObserver(function(){blit();}).observe(cv);
  }else{
    var tCur=T0,lastH=performance.now();
    var frameH=function(now){var dt=Math.min(0.1,(now-lastH)/1000);lastH=now;tCur+=dt*speed;
      render(tCur);requestAnimationFrame(frameH);};
    new ResizeObserver(function(){blit();}).observe(cv);
    requestAnimationFrame(frameH);
  }
  window.__stepShader=function(t){render(t);};
  window.__shaderRate=speed;
  window.__ready=true;
})();
</script>
</body></html>
