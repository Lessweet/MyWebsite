<script>
// ===== heatmap 背景（design-gallery 实验七移植，同 mp-cover glass-hero bg:'heatmap' 分支）=====
(function(){
  var FREEZE=null;
  var FW=180,FH=95;

  var field=document.createElement('canvas');field.width=FW;field.height=FH;

  var hp={"stops":["#e79bff","#f2c3ec","#fde5d2","#fc9d69","#fc8455"],"hot":"#fffaf0","iso":0.51,"width":0.06,"glow":0.9,"warp":1.64,"dens":0.75,"speed":2.8,"seed":2014936156,"t0":72.1};

    var tCur=T0,lastH=performance.now();
    var frameH=function(now){var dt=Math.min(0.1,(now-lastH)/1000);lastH=now;tCur+=dt*speed;
      render(tCur);requestAnimationFrame(frameH);};
    new ResizeObserver(function(){blit();}).observe(cv);
    requestAnimationFrame(frameH);
  }
  window.__stepShader=function(t){render(t);};
  window.__shaderRate=speed;
  window.__ready=true;
})();
</script>
