<script>
// ===== heatmap 背景（design-gallery 实验七移植，同 mp-cover glass-hero bg:'heatmap' 分支）=====
(function(){
  var FREEZE=null;
  var FW=180,FH=95;
  var cv=document.getElementById('sh');
  var ctx2=cv.getContext('2d');
  var field=document.createElement('canvas');field.width=FW;field.height=FH;
  var fctx=field.getContext('2d');
  var img=fctx.createImageData(FW,FH);
  var hp={"stops":["#e79bff","#f2c3ec","#fde5d2","#fc9d69","#fc8455"],"hot":"#fffaf0","iso":0.51,"width":0.06,"glow":0.9,"warp":1.64,"dens":0.75,"speed":2.8,"seed":2014936156,"t0":72.1};
  var stops=hp.stops,hotc=hp.hot;
  var iso=hp.iso,iw=hp.width,glow=hp.glow,warp=hp.warp,dens=hp.dens,speed=hp.speed,hseed=hp.seed,T0=hp.t0;
  var hex=function(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];};
  var cols=stops.map(hex),lut=new Float32Array(256*3),ns=cols.length-1;
  for(var i=0;i<256;i++){var f=i/255*ns,k=Math.min(ns-1,f|0),tt=f-k,a=cols[k],bb=cols[k+1];
    lut[i*3]=a[0]+(bb[0]-a[0])*tt;lut[i*3+1]=a[1]+(bb[1]-a[1])*tt;lut[i*3+2]=a[2]+(bb[2]-a[2])*tt;}
  var hot=hex(hotc);
  function hash(ix,iy){var n2=Math.imul(ix,374761393)+Math.imul(iy,668265263)+Math.imul(hseed,1440662683)|0;
    n2=Math.imul(n2^(n2>>>13),1274126177);n2=n2^(n2>>>16);return (n2>>>0)/4294967296;}
  function noise(x,y){var ix=Math.floor(x),iy=Math.floor(y);var fx=x-ix,fy=y-iy;

    var a=hash(ix,iy),b=hash(ix+1,iy),c=hash(ix,iy+1),d=hash(ix+1,iy+1);

  function fbm(x,y){var v=0,a=0.55,nx;for(var i=0;i<3;i++){v+=a*noise(x,y);nx=1.6*x+1.2*y;y=-1.2*x+1.6*y;x=nx;a*=0.5;}return v/0.9625;}
