    group.appendChild(svg);                            // 先挂进 DOM 才能 getBBox
    var pen=0;
    text.split('').forEach(function(ch){
      if(ch===' '){pen+=SPACE;return;}
      var glyph=GLYPHS[ch]||GLYPHS[ch.toUpperCase()];   // 先按原字查（Roboto 有真大小写），查不到再按 unicase 折成大写
      if(!glyph){missing.push(ch);return;}
      var g=document.createElementNS(NS,'g');
      g.innerHTML=glyph.d.map(function(d){return '<path d="'+d+'" fill="'+CFG.ink+'"/>';}).join('');
      svg.appendChild(g);
      var bb=g.getBBox();
      if(glyph.adv){                                   // 等宽字形库：按 advance 步进，字形按左侧空落格
        g.setAttribute('transform','translate('+(pen+glyph.lsb-bb.x).toFixed(2)+' '+glyph.dy+')');
        pen+=glyph.adv;
      }else{
        g.setAttribute('transform','translate('+(pen-bb.x).toFixed(2)+' '+glyph.dy+')');
        pen+=bb.width+TRACK;

    pen=Math.max(1,pen-TRACK);

    svg.style.height=CFG.wmH+'px';

  }

  CFG.title.split('|').forEach(function(seg,i){
    if(i>0){
      var bar=document.createElement('div');
      bar.className='ic bar';
      bar.style.width=Math.round(CFG.wmH*0.155)+'px';
      bar.style.height=Math.round(CFG.wmH*0.76)+'px';
      bar.style.margin='0 '+CFG.gap+'px';              // 两侧间距 = gap + margin = 2×gap
      group.appendChild(bar);
    }

    if(seg)buildSeg(seg);
  });

})();

    var st=(CFG.time0!=null?CFG.time0:U_TIME),last=performance.now();
    var frame=function(now){var dt=Math.min(0.05,(now-last)/1000);last=now;st+=dt*0.9;
      render(st);requestAnimationFrame(frame);};
    new ResizeObserver(function(){render(st);}).observe(cv);
    requestAnimationFrame(frame);
  }
  window.__stepShader=function(t){render(t);};   // 导出 GIF/MP4 逐帧驱动
  window.__shaderRate=0.9;                       // t 每真实秒推进量
})();
}else{
var m=makeMesh(cv,3);
m.setColors(CFG.colors);
m.setParams({dist:CFG.dist,swirl:CFG.swirl,grain:CFG.grain,seed:CFG.seed});
var shaderTime=(CFG.time0!=null?CFG.time0:U_TIME),last=performance.now();
if(CFG.freeze!=null){
  m.draw(CFG.freeze);
  new ResizeObserver(function(){m.draw(CFG.freeze);}).observe(cv);
}else{
  var frame=function(now){var dt=Math.min(0.05,(now-last)/1000);last=now;shaderTime+=dt*0.9;
    m.draw(shaderTime);requestAnimationFrame(frame);};
  new ResizeObserver(function(){m.draw(shaderTime);}).observe(cv);
  requestAnimationFrame(frame);
}
window.__stepShader=function(t){m.draw(t);};   // 导出 GIF/MP4 时逐帧驱动
window.__shaderRate=0.9;                       // u_time 每真实秒推进量，导出端读它做速率对齐
}
</script>
<script>
// ===== 符号纹理层（design-gallery 实验五 · Texture Layer）=====
// 公式 = 底层渐变 × 图案平铺 × 软蒙版：图案本身是规则无限平铺的白色细线，
// 靠 overlay 借底色 —— 亮处清晰、暗处隐形；不规则感全部来自软蒙版：
// 2~4 团软椭圆交替落左右三分位、避开中心主体，各自错相位「呼吸」+ 绕基准点慢速漂移。
// CFG.tex=null 时整层不存在（默认）；CFG.tex='line' 开斜线。蒙版随机数吃 CFG.seed，静/动同画面。
if(CFG.tex){(function(){
  var PATTERNS={
    line:{pat:'repeating-linear-gradient(45deg, rgba(255,255,255,1) 0 1px, transparent 1px 8px)',size:'auto'},
    dots:{pat:'radial-gradient(circle at 50% 50%, rgba(255,255,255,1) 2px, transparent 2.8px)',size:'16px 16px'}
  };
  var p=PATTERNS[CFG.tex]||PATTERNS.line;
  var el=document.createElement('div');
  el.style.cssText='position:absolute;inset:0;pointer-events:none;background-image:'+p.pat+
    ';background-size:'+p.size+';mix-blend-mode:'+(CFG.texBlend||'overlay')+';opacity:'+(CFG.texOp!=null?CFG.texOp:1)+';';
  var wrap=document.getElementById('wrap');
  wrap.insertBefore(el,document.querySelector('.center'));   // 铺在 shader 之上、字标之下
  // 播种随机：同一 seed → 同一组蒙版，静态 PNG 与动态 HTML 不会跑出两套形态
  var s=(CFG.seed==null?42:CFG.seed)*9301+49297,rnd=function(a,b){s=(s*9301+49297)%233280;return a+(s/233280)*(b-a);};
  // 落位两种：默认 = 实验五原版（左右三分位交替、避开中心主体）；
  // texLayout='diag' = 对角线布局：各团串在左上→右下这条对角线上（与 45° 斜线同向），
  // 连成一条斜贯画面的纹理带，而不是散在两侧的孤岛。
  // 对角线上刻意排得不匀：团数多一点，沿线的间距按随机步长累积（有的挤成一簇、有的空一大段），
  // 再各自沿对角线的法向偏出去 ±14%，大小和浓度也拉开档次 —— 免得看着像等距贴上去的贴纸。
  var DIAG=(CFG.texLayout==='diag');
  var blobs=(function(){
    var n=DIAG?(4+Math.floor(rnd(0,3))):(2+Math.floor(rnd(0,3))),o=[],steps=[],sum=0,i;
    for(i=0;i<n;i++){var st=rnd(0.35,1.65);steps.push(st);sum+=st;}   // 步长忽长忽短 = 疏密不均
    var acc=0;
    for(i=0;i<n;i++){
      acc+=steps[i];
      var u=(acc-steps[i]*rnd(0.3,0.7))/sum;                          // 沿对角线的位置 0~1
      var off=rnd(-14,14);                                            // 法向偏移：+x −y 即垂直于对角线
      o.push({
        x:DIAG?(6+88*u+off):((i%2===0)?rnd(60,88):rnd(8,36)),
        y:DIAG?(6+88*u-off):rnd(18,82),
        rx:DIAG?rnd(14,46):rnd(22,40), ry:DIAG?rnd(20,66):rnd(34,58),
        a:DIAG?rnd(0.35,1):rnd(0.65,1),
        phA:i/n*6.283+rnd(-0.9,0.9), spA:rnd(0.07,0.18),              // 呼吸：周期 6~14s，相位错开
        dx:rnd(3,8), dy:rnd(3,8), phD:rnd(0,6.283), spD:rnd(0.04,0.09) // 漂移：幅度 3~8%、周期 11~25s
      });
    }
    return o;})();
  function paint(t){
    var m=blobs.map(function(b){
      var breathe=0.5+0.5*Math.sin(t*b.spA*6.283+b.phA);
      var x=b.x+b.dx*Math.sin(t*b.spD*6.283+b.phD), y=b.y+b.dy*Math.cos(t*b.spD*6.283+b.phD*1.3);
      var a=b.a*(0.08+0.92*breathe);
      return 'radial-gradient(ellipse '+b.rx.toFixed(0)+'% '+b.ry.toFixed(0)+'% at '+x.toFixed(0)+'% '+y.toFixed(0)+'%, rgba(0,0,0,'+a.toFixed(2)+') 0%, transparent 72%)';
    }).join(',');
    el.style.webkitMaskImage=m; el.style.maskImage=m;
  }
  if(CFG.freeze!=null){paint(CFG.freeze);}
  else{
    var st=(CFG.time0!=null?CFG.time0:0),last=performance.now();
    var frame=function(now){var dt=Math.min(0.05,(now-last)/1000);last=now;st+=dt*0.9;paint(st);requestAnimationFrame(frame);};
    paint(st);requestAnimationFrame(frame);
  }
  var prev=window.__stepShader;                       // GIF 导出：跟着 shader 一起逐帧推进
  window.__stepShader=function(t){prev&&prev(t);paint(t);};
})();}
</script>
<script>
// ===== 4:3 安全区自适应（bespoke 封面必备的 CLUSTER 等价物）=====
(function(){
  var SAFE_W=560, SAFE_H=380;
  function fitGroup(){
    var g=document.querySelector(".group"); if(!g) return;
    g.style.transform="none";
    var sx=(window.innerWidth||1080)/1080;
    var r=g.getBoundingClientRect();
    var s=Math.min(1, SAFE_W/(r.width/sx), SAFE_H/(r.height/sx));
    g.style.transform="scale("+s.toFixed(4)+")";
  }
  if(document.readyState!=="loading") fitGroup(); else document.addEventListener("DOMContentLoaded",fitGroup);
  window.addEventListener("resize",fitGroup);
  window.__ready=true;
})();
</script>
