<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg: #ededed;
    --surface: #ffffff;
    --surface-2: #f7f7f7;
    --border: #d7d7d7;
    --border-strong: #1c1c1c;
    --text: #181818;
    --text-muted: #666666;
    --text-dim: #969696;
    --brand: #000000;
    --brand-soft: rgba(0, 0, 0, 0.08);
    --dur-1-5: 1.5s;
    --dur-1-8: 1.8s;
    --dur-2-1: 2.1s;
    --dur-2-2: 2.2s;
    --dur-2-3: 2.3s;
    --dur-2-4: 2.4s;
    --dur-2-5: 2.5s;
    --dur-2-6: 2.6s;
    --dur-2-8: 2.8s;
    --dur-4-0: 4s;
    --dur-5-0: 5s;
    --dur-8-0: 8s;
    --dur-24-0: 24s;
    --delay-150: 150ms;
    --delay-300: 300ms;
    --delay-600: 600ms;
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  main {
    width: min(1040px, calc(100% - 40px));
    margin: 0 auto;
    padding: 36px 0 72px;
  }

  .brand-banner {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 0 0 24px;
    padding: 8px 12px;
    min-height: 220px;
    background: transparent;
    cursor: pointer;
    user-select: none;
  }
  .brand-banner-grid {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    font-weight: 700;
    line-height: 0.65;
    letter-spacing: 0;
    white-space: pre;
  }
  .brand-banner .px-letter {
    color: var(--brand);
    animation: px-pulse 2.6s ease-in-out infinite;
    animation-delay: var(--d, 0s);
  }
  .brand-banner .px-accent,
  .brand-banner .px-star {
    color: var(--text-dim);
    animation: px-twinkle 3.6s ease-in-out infinite;
    animation-delay: var(--d, 0s);
  }
  @keyframes px-twinkle {
    0%, 100% { opacity: 0.18; }
    50%      { opacity: 0.65; }
  }
  @keyframes px-pulse {
    0%, 100% { opacity: 0.82; }
    50%      { opacity: 1; }
  }

  header {
    margin-bottom: 16px;
  }

  h1 {
    margin: 0 0 6px;
    font-size: 24px;
    line-height: 1.2;
    font-weight: 650;
  }

  .subtitle {
    margin: 0;
    max-width: 620px;
    color: var(--text-muted);
  }

  .spec {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    width: fit-content;
    max-width: 100%;
    margin-bottom: 16px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    white-space: normal;
  }

  .spec-divider {
    width: 1px;
    height: 18px;
    background: var(--border);
  }

  .weight-control {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .weight-control label {
    color: var(--text-muted);
  }

  .weight-control input {
    width: 58px;
    min-height: 28px;
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--text);
    font: inherit;
  }

  .weight-control input:focus {
    outline: none;
    border-color: var(--border-strong);
  }

  .color-control {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border: 0;
    padding: 0;
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
  }

  .color-control:focus-within {
    outline: 2px solid var(--border-strong);
    outline-offset: 3px;
  }

  .color-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--brand);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    pointer-events: none;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .toolbar strong {
    color: var(--text);
    font-weight: 600;
  }

  .toolbar .motion-rules {
    position: relative;
    flex: 0 0 auto;
    margin: 0;
  }

  .spec .motion-rules {
    position: relative;
    flex: 0 0 auto;
    margin: 0 0 0 auto;
  }

  .toolbar .motion-rules.is-collapsible {
    overflow: visible;
  }

  .spec .motion-rules.is-collapsible {
    overflow: visible;
  }

  .toolbar .motion-rules-toggle {
    min-height: 36px;
    padding: 0 14px;
    white-space: nowrap;
  }

  .spec .motion-rules-toggle {
    min-height: 28px;
    padding: 0 10px;
    white-space: nowrap;
  }

  .toolbar .motion-rules .motion-rule-list,
  .spec .motion-rules .motion-rule-list {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    z-index: 20;
    width: min(760px, calc(100vw - 40px));
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
  }

  .motion-rules {
    margin: 0 0 16px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }

  .motion-rules.is-collapsible {
    padding: 0;
    overflow: hidden;
  }

  .motion-rules h2 {
    margin: 0 0 10px;
    font-size: 13px;
    font-weight: 650;
  }

  .motion-rules.is-collapsible h2 {
    margin: 0;
  }

  .motion-rules-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    min-height: 44px;
    padding: 0 14px;
    border: 0;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    font-weight: 650;
    text-align: left;
    cursor: pointer;
  }

  .motion-rules-toggle:hover {
    background: var(--surface-2);
  }

  .motion-rules-toggle-icon {
    width: 16px;
    height: 16px;
    margin-left: 12px;
    flex: 0 0 auto;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    transition: transform 0.18s ease;
  }

  .motion-rules:not(.is-collapsed) .motion-rules-toggle-icon {
    transform: rotate(180deg);
  }

  .motion-rule-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }

  .motion-rules.is-collapsible .motion-rule-list {
    padding: 0 14px 14px;
  }

  .toolbar .motion-rules.is-collapsible .motion-rule-list {
    padding: 14px;
  }

  .spec .motion-rules.is-collapsible .motion-rule-list {
    padding: 14px;
  }

  .motion-rule-list[hidden] {
    display: none;
  }

  .motion-rule {
    min-height: 82px;
    padding: 10px;
    border-radius: var(--radius);
    background: var(--surface-2);
  }

  .motion-rule strong {
    display: block;
    margin-bottom: 4px;
    color: var(--text);
    font-size: 12px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
  }

  .motion-rule span {
    color: var(--text-muted);
    font-size: 12px;
  }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
  }

  .section-divider {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .section-divider h2 {
    margin: 0 0 6px;
    font-size: 22px;
    line-height: 1.2;
    font-weight: 650;
  }

  .section-divider p {
    margin: 0;
    max-width: 620px;
    color: var(--text-muted);
  }

  .pixel-grid .icon-preview svg {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    shape-rendering: crispEdges;
  }

  .gradient-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    flex-wrap: wrap;
  }

  .gradient-color-set {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .gradient-canvas {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    isolation: isolate;
    border: 1px solid var(--border);
    background: linear-gradient(135deg,
      var(--g-color-1, #fffee0) 0%,
      var(--g-color-2, #ebccff) 50%,
      var(--g-color-3, #c2fffd) 100%);
  }

  .gradient-blob {
    position: absolute;
    width: 110%;
    aspect-ratio: 1;
    border-radius: 50%;
    filter: blur(var(--g-blur, 80px));
    will-change: transform;
  }

  .gradient-blob-1 {
    background: radial-gradient(circle, var(--g-color-1, #fffee0) 0%, transparent 70%);
    top: -30%;
    left: -30%;
    animation: gradient-drift-1 calc(14s / var(--g-speed, 1)) ease-in-out infinite alternate;
  }

  .gradient-blob-2 {
    background: radial-gradient(circle, var(--g-color-2, #ebccff) 0%, transparent 70%);
    top: -10%;
    left: 20%;
    animation: gradient-drift-2 calc(17s / var(--g-speed, 1)) ease-in-out infinite alternate;
  }

  .gradient-blob-3 {
    background: radial-gradient(circle, var(--g-color-3, #c2fffd) 0%, transparent 70%);
    top: 20%;
    left: -10%;
    animation: gradient-drift-3 calc(20s / var(--g-speed, 1)) ease-in-out infinite alternate;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
    width: 110px;
    height: 12px;
    padding: 0;
    border: 0;
    margin: 0;
    vertical-align: middle;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 1px;
    background: var(--text-dim);
  }

  input[type="range"]::-moz-range-track {
    height: 1px;
    background: var(--text-dim);
    border: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 11px;
    height: 11px;
    margin-top: -5px;
    background: var(--text);
    border: 0;
    border-radius: 0;
    cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 11px;
    height: 11px;
    background: var(--text);
    border: 0;
    border-radius: 0;
    cursor: pointer;
  }

  .weight-value {
    display: inline-block;
    min-width: 28px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
    font-size: 12px;
  }

  .ascii-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .ascii-stage {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 340px;
    overflow: hidden;
  }

  .ascii-canvas {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    line-height: 1;
    letter-spacing: 0;
    white-space: pre;
    margin: 0;
    user-select: none;
    color: var(--brand);
    opacity: 0.85;
  }

  @media (max-width: 720px) {
    .ascii-grid {
      grid-template-columns: 1fr;
    }
  }

  @keyframes gradient-drift-1 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(50%, 30%) scale(1.2); }
    66%  { transform: translate(20%, 60%) scale(0.9); }
    100% { transform: translate(70%, 20%) scale(1.1); }
  }

  @keyframes gradient-drift-2 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(-30%, 40%) scale(1.15); }
    66%  { transform: translate(40%, -20%) scale(0.95); }
    100% { transform: translate(-20%, 50%) scale(1.05); }
  }

  @keyframes gradient-drift-3 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(50%, -30%) scale(1.1); }
    66%  { transform: translate(-20%, 40%) scale(1.2); }
    100% { transform: translate(40%, 50%) scale(0.9); }
  }

  .icon-card {
    padding: 16px;
    border-radius: var(--radius);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }

  .icon-preview {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: var(--radius);
    background: var(--brand-soft);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-preview svg {
    width: 64%;
    height: 64%;
    display: block;
    overflow: visible;
  }

  .icon-card[data-animation]:not([data-animation=""]) [class*="anim-"],
  .icon-card[data-animation]:not([data-animation=""]) .favorite-star,
  .icon-card[data-animation]:not([data-animation=""]) .favorite-rays {
    transform-box: fill-box;
    transform-origin: center;
  }

  .icon-card[data-animation]:not([data-animation=""]) .anim-viewbox {
    transform-box: view-box;
    transform-origin: center;
  }

  .icon-card[data-animation="doc"] .anim-doc-line {
    animation: doc-line-write var(--dur-2-8) ease-in-out infinite;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  .icon-card[data-animation="doc"] .anim-doc-line-2 { animation-delay: var(--delay-300); }
  .icon-card[data-animation="doc"] .anim-doc-line-3 { animation-delay: var(--delay-600); }
  .icon-card[data-animation="user"] .anim-user-head { animation: user-head var(--dur-2-3) ease-out infinite; }
  .icon-card[data-animation="user"] .anim-user-shoulders { animation: user-shoulders var(--dur-2-3) ease-out infinite; }
  .icon-card[data-animation="settings"] .anim-gear { animation: gear-turn var(--dur-2-8) cubic-bezier(0.25, 0.8, 0.2, 1) infinite; transform-box: view-box; transform-origin: 12px 12px; }
  .icon-card[data-animation="search"] .anim-search { animation: search-scan var(--dur-4-0) cubic-bezier(0.16, 0.9, 0.2, 1) infinite; transform-box: view-box; transform-origin: center; }
  .icon-card[data-animation="cart"] .anim-cart-burst {
    animation: cart-burst var(--dur-2-5) ease-out infinite;
    opacity: 0;
  }
  .icon-card[data-animation="cart"] .anim-cart-burst-1 { --tx: -5px; --ty: -9px; }
  .icon-card[data-animation="cart"] .anim-cart-burst-2 { --tx: -1px; --ty: -11px; animation-delay: var(--delay-150); }
  .icon-card[data-animation="cart"] .anim-cart-burst-3 { --tx: 3px; --ty: -10px; animation-delay: var(--delay-300); }
  .icon-card[data-animation="cart"] .anim-cart-burst-4 { --tx: 6px; --ty: -8px; animation-delay: var(--delay-300); }
  .icon-card[data-animation="clap"] .anim-clap-hand { animation: clap-hand var(--dur-1-8) ease-in-out infinite; transform-box: view-box; transform-origin: 9px 14px; }
  .icon-card[data-animation="clap"] .anim-clap-lines { animation: clap-lines var(--dur-1-8) ease-out infinite; transform-box: view-box; transform-origin: center; }
  .icon-card[data-animation="music"] .anim-music-note {
    animation: music-float var(--dur-2-8) ease-in-out infinite;
    opacity: 0;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="music"] .anim-music-base {
    animation: music-tilt var(--dur-2-8) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: 12px 14px;
  }
  .icon-card[data-animation="music"] .anim-music-note-2 { animation-delay: calc(var(--dur-2-8) / 2); }
  .icon-card[data-animation="lightning"] .icon-preview svg {
    animation: lightning-pulse var(--dur-1-8) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="lightning"] .anim-lightning {
    animation: lightning-flash var(--dur-2-4) ease-in-out infinite;
  }
  .icon-card[data-animation="pencil"] .anim-pencil { animation: pencil-write var(--dur-5-0) ease-in-out infinite; transform-box: view-box; transform-origin: 13px 12px; }
  .icon-card[data-animation="pencil"] .anim-pencil-trace {
    animation: pencil-trace var(--dur-5-0) ease-in-out infinite;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  .icon-card[data-animation="eye"] .anim-eye-shape { animation: eye-blink var(--dur-2-8) ease-in-out infinite; transform-box: view-box; transform-origin: 12px 12px; }
  .icon-card[data-animation="eye"] .anim-eye-pupil { animation: eye-pupil-blink var(--dur-2-8) ease-in-out infinite; transform-box: view-box; transform-origin: center; }
  .icon-card[data-animation="bell"] .anim-bell { animation: bell-rattle var(--dur-4-0) cubic-bezier(0.25, 0.75, 0.2, 1) infinite; transform-box: view-box; transform-origin: 12px 4px; }
  .icon-card[data-animation="bell"] .anim-bell-clapper { animation: bell-clapper var(--dur-4-0) linear infinite; transform-box: view-box; transform-origin: 12px 17px; }
  .icon-card[data-animation="pin"] .anim-pin-ripple {
    animation: pin-ripple var(--dur-2-5) ease-out infinite;
    opacity: 0;
  }
  .icon-card[data-animation="pin"] .anim-pin-ripple-2 { animation-delay: calc(var(--dur-2-5) / 3); }
  .icon-card[data-animation="pin"] .anim-pin-ripple-3 { animation-delay: calc(var(--dur-2-5) * 2 / 3); }
  .icon-card[data-animation="brain"] .anim-brain {
    animation: brain-pulse var(--dur-2-2) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: 12px 12px;
  }
  .icon-card[data-animation="ai-image"] .anim-ai-spark {
    animation: ai-twinkle var(--dur-2-2) ease-in-out infinite;
  }
  .icon-card[data-animation="ai-image"] .anim-ai-spark-small {
    animation-delay: calc(var(--dur-2-2) / 2);
  }
  .icon-card[data-animation="ai-cursor"] .anim-cursor {
    animation: cursor-nudge var(--dur-2-2) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: 10px 12px;
  }
  .icon-card[data-animation="ai-cursor"] .anim-cursor-click {
    animation: cursor-click var(--dur-2-2) ease-out infinite;
    opacity: 0;
    transform-box: view-box;
    transform-origin: 6px 5px;
  }
  .icon-card[data-animation="ai-cursor"] .anim-cursor-spark {
    animation: ai-twinkle var(--dur-2-2) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: 18px 6px;
  }
  .icon-card[data-animation="hourglass"] .anim-hourglass-top {
    animation: hourglass-top var(--dur-2-8) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: 12px 8px;
  }
  .icon-card[data-animation="hourglass"] .anim-hourglass-stream {
    animation: hourglass-stream var(--dur-2-8) ease-in-out infinite;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  .icon-card[data-animation="hourglass"] .anim-hourglass-bottom {
    animation: hourglass-bottom var(--dur-2-8) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: 12px 18px;
  }
  .icon-card[data-animation="px-brain"] .icon-preview svg {
    animation: px-pulse var(--dur-1-5) step-end infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="px-heart"] .icon-preview svg {
    animation: px-beat var(--dur-1-5) step-end infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="px-lightning"] .icon-preview svg {
    animation: px-flash var(--dur-1-5) step-end infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="px-favorite"] .icon-preview svg {
    animation: px-twinkle var(--dur-1-5) step-end infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="px-gift"] .icon-preview svg {
    animation: px-shake var(--dur-1-5) step-end infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="px-home"] .icon-preview svg {
    animation: px-bounce var(--dur-1-5) step-end infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="px-robot"] .icon-preview svg {
    animation: px-bounce var(--dur-1-5) step-end infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="px-chip"] .icon-preview svg {
    animation: px-pulse var(--dur-1-5) step-end infinite;
    transform-box: view-box;
