<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant Motion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000000;
  }
  .stage {
    position: relative;
    width: 100%;
    height: 100%;
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .lottie-wrap {
    width: 180px;
  }
  .ai-btn {
    margin-top: -32px;
  }
  .ai-btn img {
    width: 224px;
    height: auto;
    display: block;
    position: relative;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="lottie-wrap" id="lottie"></div>
    <div class="ai-btn">
      <img src="ButtonBasic.png" alt="AI 助手">
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="animation.js"></script>
  <script>
    lottie.loadAnimation({
      container: document.getElementById('lottie'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      animationData: window.aiAssistantAnimationData
    });
  </script>
</body>
</html>
