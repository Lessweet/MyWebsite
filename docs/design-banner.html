<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #f7f7f7;
    --border: #d7d7d7;
    --border-strong: #1c1c1c;
    --text: #181818;
    --text-muted: #666666;
    --text-dim: #969696;
    --brand: #000000;
    --brand-soft: rgba(0, 0, 0, 0.08);
    --brand-banner-bg: #C3C0FA;
    --dur-1-5: 1.5s;
    --dur-1-8: 1.8s;
    --dur-2-1: 2.1s;
    --dur-2-2: 2.2s;
    --dur-2-3: 2.3s;
    --dur-2-4: 2.4s;
    --dur-2-5: 2.5s;
    --dur-2-6: 2.6s;
    --dur-2-8: 2.8s;
    --dur-4-0: 4s;
    --dur-5-0: 5s;
    --dur-8-0: 8s;
    --dur-24-0: 24s;
    --delay-150: 150ms;
    --delay-300: 300ms;
    --delay-600: 600ms;
    --radius: 8px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  main {
    width: min(1040px, calc(100% - 40px));
    margin: 0 auto;
    padding: 116px 0 72px;   /* 顶部 36 → 116:banner 内元素整体下移 80px */
  }

  .brand-banner-shell {
    position: relative;
    width: 100vw;
    margin: 0 calc(50% - 50vw) 24px;
    background-color: var(--brand-banner-bg);
    overflow: hidden;
    /* 字色随样式瞬时切换,底色过渡必须明显短于最快的样式停留时间(200ms),
       否则「字色+底色」的成对配色会错位(黄字压在柠檬绿底上看不清)。 */
    transition: background-color 0.12s ease;
  }

  .brand-banner {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: min(1040px, calc(100% - 40px));
    margin: 0 auto;
    padding: 20px 12px;
    min-height: 440px;
    background: transparent;
    cursor: pointer;
    user-select: none;
  }

  .brand-particle-canvas {
    position: absolute;
    inset: 0;
    z-index: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .banner-download-btn {
    position: absolute;
    top: 18px;
    right: max(20px, calc((100vw - 1040px) / 2 + 20px));
    z-index: 4;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    padding: 0;
    border: 1px solid rgba(24, 24, 24, 0.16);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.78);
    color: rgba(24, 24, 24, 0.72);
    cursor: pointer;
    backdrop-filter: blur(12px);
    transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
  }

  .banner-download-btn:hover {
    border-color: rgba(24, 24, 24, 0.34);
    background: rgba(255, 255, 255, 0.92);
    color: var(--text);
  }

  .banner-download-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
  }

  .brand-banner-grid {
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    /* 像素字宽 = 110 列 × 字宽,窄屏会溢出;按视口宽度等比缩小字号让 VIBEDESIGN 完整显示。
       封顶 22px(原 11px ×2,配合 banner 高度加倍);窄屏仍按 /72 自动缩小不溢出 */
    font-size: min(22px, calc((100vw - 72px) / 72));
    font-weight: 700;
    line-height: 0.65;
    letter-spacing: 0;
    white-space: pre;
  }
  .brand-banner .px-letter {
    display: inline-block;
    color: var(--brand);
    transform: translate3d(var(--sand-x, 0px), var(--sand-y, 0px), 0) rotate(var(--sand-rot, 0deg));
    transition: transform var(--sand-letter-duration, 0.34s) cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
    animation: px-pulse 2.6s ease-in-out infinite;
    animation-delay: var(--d, 0s);
  }
  .brand-banner .px-accent,
  .brand-banner .px-star {
    display: inline-block;
    color: var(--text-dim);
    transform: translate3d(var(--sand-x, 0px), var(--sand-y, 0px), 0) rotate(var(--sand-rot, 0deg));
    transition: transform var(--sand-decor-duration, 0.42s) cubic-bezier(0.16, 1, 0.3, 1);
    will-change: transform;
    animation: px-twinkle 3.6s ease-in-out infinite;
    animation-delay: var(--d, 0s);
  }
  @keyframes px-twinkle {
    0%, 100% { opacity: 0.18; }
    50%      { opacity: 0.65; }
  }
  @keyframes px-pulse {
    0%, 100% { opacity: 0.82; }
    50%      { opacity: 1; }
  }

  header {
    margin-bottom: 16px;
  }

  h1 {
    margin: 0 0 6px;
    font-size: 24px;
    line-height: 1.2;
    font-weight: 650;
  }

  .subtitle {
    margin: 0;
    max-width: 620px;
    color: var(--text-muted);
  }

  .spec {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    width: fit-content;
    max-width: 100%;
    margin-bottom: 16px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    white-space: normal;
  }

  .spec-divider {
    width: 1px;
    height: 18px;
    background: var(--border);
  }

  .weight-control {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .weight-control label {
    color: var(--text-muted);
  }

  .weight-control input {
    width: 58px;
    min-height: 28px;
    padding: 2px 7px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--text);
    font: inherit;
  }

  .weight-control input:focus {
    outline: none;
    border-color: var(--border-strong);
  }

  .color-control {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border: 0;
    padding: 0;
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
  }

  .color-control:focus-within {
    outline: 2px solid var(--border-strong);
    outline-offset: 3px;
  }

  .color-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }

  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--brand);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    pointer-events: none;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .toolbar strong {
    color: var(--text);
    font-weight: 600;
  }

  .toolbar .motion-rules {
    position: relative;
    flex: 0 0 auto;
    margin: 0;
  }

  .spec .motion-rules {
    position: relative;
    flex: 0 0 auto;
    margin: 0 0 0 auto;
  }

  .toolbar .motion-rules.is-collapsible {
    overflow: visible;
  }

  .spec .motion-rules.is-collapsible {
    overflow: visible;
  }

  .toolbar .motion-rules-toggle {
    min-height: 36px;
    padding: 0 14px;
    white-space: nowrap;
  }

  .spec .motion-rules-toggle {
    min-height: 28px;
    padding: 0 10px;
    white-space: nowrap;
  }

  .toolbar .motion-rules .motion-rule-list,
  .spec .motion-rules .motion-rule-list {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    z-index: 20;
    width: min(760px, calc(100vw - 40px));
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
  }

  .motion-rules {
    margin: 0 0 16px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
  }

  .motion-rules.is-collapsible {
    padding: 0;
    overflow: hidden;
  }

  .motion-rules h2 {
    margin: 0 0 10px;
    font-size: 13px;
    font-weight: 650;
  }

  .motion-rules.is-collapsible h2 {
    margin: 0;
  }

  .motion-rules-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    min-height: 44px;
    padding: 0 14px;
    border: 0;
    background: transparent;
    color: var(--text);
    font: inherit;
    font-size: 13px;
    font-weight: 650;
    text-align: left;
    cursor: pointer;
  }

  .motion-rules-toggle:hover {
    background: var(--surface-2);
  }

  .motion-rules-toggle-icon {
    width: 16px;
    height: 16px;
    margin-left: 12px;
    flex: 0 0 auto;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    transition: transform 0.18s ease;
  }

  .motion-rules:not(.is-collapsed) .motion-rules-toggle-icon {
    transform: rotate(180deg);
  }

  .motion-rule-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }

  .motion-rules.is-collapsible .motion-rule-list {
    padding: 0 14px 14px;
  }

  .toolbar .motion-rules.is-collapsible .motion-rule-list {
    padding: 14px;
  }

  .spec .motion-rules.is-collapsible .motion-rule-list {
    padding: 14px;
  }

  .motion-rule-list[hidden] {
    display: none;
  }

  .motion-rule {
    min-height: 82px;
    padding: 10px;
    border-radius: var(--radius);
    background: var(--surface-2);
  }

  .motion-rule strong {
    display: block;
    margin-bottom: 4px;
    color: var(--text);
    font-size: 12px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
  }

  .motion-rule span {
    color: var(--text-muted);
    font-size: 12px;
  }

  .icon-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 10px;
  }

  .section-divider {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .section-divider h2 {
    margin: 0 0 6px;
    font-size: 22px;
    line-height: 1.2;
    font-weight: 650;
  }

  .section-divider p {
    margin: 0;
    max-width: 620px;
    color: var(--text-muted);
  }

  .pixel-grid .icon-preview svg {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    shape-rendering: crispEdges;
  }

  .gradient-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    flex-wrap: wrap;
  }

  .gradient-color-set {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .gradient-canvas {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    isolation: isolate;
    border: 1px solid var(--border);
    background: linear-gradient(135deg,
      var(--g-color-1, #b8e0ff) 0%,
      var(--g-color-2, #c2fff0) 100%);
  }

  .gradient-blob {
    position: absolute;
    width: 110%;
    aspect-ratio: 1;
    border-radius: 50%;
    filter: blur(var(--g-blur, 80px));
    will-change: transform;
  }

  .gradient-blob-1 {
    background: radial-gradient(circle, var(--g-color-1, #b8e0ff) var(--g-solid, 0%), transparent var(--g-fade, 70%));
    top: -30%;
    left: -30%;
    animation: gradient-drift-1 calc(14s / var(--g-speed, 1)) ease-in-out infinite alternate;
  }

  .gradient-blob-2 {
    background: radial-gradient(circle, var(--g-color-2, #c2fff0) var(--g-solid, 0%), transparent var(--g-fade, 70%));
    top: -10%;
    left: 20%;
    animation: gradient-drift-2 calc(17s / var(--g-speed, 1)) ease-in-out infinite alternate;
  }

  .lab-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 20px;
  }

  @media (max-width: 900px) {
    .lab-grid { grid-template-columns: 1fr; }
  }

  .lab-column { min-width: 0; }

  .lab-column .lab-subtitle { margin-top: 0; }

  .lab-subtitle {
    margin: 28px 0 4px;
    font-size: 14px;
    font-weight: 650;
    color: var(--text);
  }

  .lab-subtitle-desc {
    margin: 0 0 12px;
    max-width: 620px;
    color: var(--text-muted);
    font-size: 13px;
  }

  .gradient-canvas-2 {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #111;
  }

  .gradient-canvas-2 canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    cursor: pointer;
    width: 110px;
    height: 12px;
    padding: 0;
    border: 0;
    margin: 0;
    vertical-align: middle;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 1px;
    background: var(--text-dim);
  }

  input[type="range"]::-moz-range-track {
    height: 1px;
    background: var(--text-dim);
    border: 0;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 11px;
    height: 11px;
    margin-top: -5px;
    background: var(--text);
    border: 0;
    border-radius: 0;
    cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 11px;
    height: 11px;
    background: var(--text);
    border: 0;
    border-radius: 0;
    cursor: pointer;
  }

  .weight-value {
    display: inline-block;
    min-width: 28px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
    font-size: 12px;
  }

  .ascii-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .ascii-stage {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 340px;
    overflow: hidden;
  }

  .ascii-canvas {
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 11px;
    line-height: 1;
    letter-spacing: 0;
    white-space: pre;
    margin: 0;
    user-select: none;
    color: var(--brand);
    opacity: 0.85;
  }

  @media (max-width: 720px) {
    .ascii-grid {
      grid-template-columns: 1fr;
    }
  }

  @keyframes gradient-drift-1 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(50%, 30%) scale(1.2); }
    66%  { transform: translate(20%, 60%) scale(0.9); }
    100% { transform: translate(70%, 20%) scale(1.1); }
  }

  @keyframes gradient-drift-2 {
    0%   { transform: translate(0, 0) scale(1); }
    33%  { transform: translate(-30%, 40%) scale(1.15); }
    66%  { transform: translate(40%, -20%) scale(0.95); }
    100% { transform: translate(-20%, 50%) scale(1.05); }
  }

  .icon-card {
    padding: 16px;
    border-radius: var(--radius);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }

  .icon-preview {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: var(--radius);
    background: var(--brand-soft);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-preview svg {
    width: 64%;
    height: 64%;
    display: block;
    overflow: visible;
  }

  .icon-card[data-animation]:not([data-animation=""]) [class*="anim-"],
  .icon-card[data-animation]:not([data-animation=""]) .favorite-star,
  .icon-card[data-animation]:not([data-animation=""]) .favorite-rays {
    transform-box: fill-box;
    transform-origin: center;
  }

  .icon-card[data-animation]:not([data-animation=""]) .anim-viewbox {
    transform-box: view-box;
    transform-origin: center;
  }

  .icon-card[data-animation="doc"] .anim-doc-line {
    animation: doc-line-write var(--dur-2-8) ease-in-out infinite;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  .icon-card[data-animation="doc"] .anim-doc-line-2 { animation-delay: var(--delay-300); }
  .icon-card[data-animation="doc"] .anim-doc-line-3 { animation-delay: var(--delay-600); }
  .icon-card[data-animation="user"] .anim-user-head { animation: user-head var(--dur-2-3) ease-out infinite; }
  .icon-card[data-animation="user"] .anim-user-shoulders { animation: user-shoulders var(--dur-2-3) ease-out infinite; }
  .icon-card[data-animation="settings"] .anim-gear { animation: gear-turn var(--dur-2-8) cubic-bezier(0.25, 0.8, 0.2, 1) infinite; transform-box: view-box; transform-origin: 12px 12px; }
  .icon-card[data-animation="search"] .anim-search { animation: search-scan var(--dur-4-0) cubic-bezier(0.16, 0.9, 0.2, 1) infinite; transform-box: view-box; transform-origin: center; }
  .icon-card[data-animation="cart"] .anim-cart-burst {
    animation: cart-burst var(--dur-2-5) ease-out infinite;
    opacity: 0;
  }
  .icon-card[data-animation="cart"] .anim-cart-burst-1 { --tx: -5px; --ty: -9px; }
  .icon-card[data-animation="cart"] .anim-cart-burst-2 { --tx: -1px; --ty: -11px; animation-delay: var(--delay-150); }
  .icon-card[data-animation="cart"] .anim-cart-burst-3 { --tx: 3px; --ty: -10px; animation-delay: var(--delay-300); }
  .icon-card[data-animation="cart"] .anim-cart-burst-4 { --tx: 6px; --ty: -8px; animation-delay: var(--delay-300); }
  .icon-card[data-animation="clap"] .anim-clap-hand { animation: clap-hand var(--dur-1-8) ease-in-out infinite; transform-box: view-box; transform-origin: 9px 14px; }
  .icon-card[data-animation="clap"] .anim-clap-lines { animation: clap-lines var(--dur-1-8) ease-out infinite; transform-box: view-box; transform-origin: center; }
  .icon-card[data-animation="music"] .anim-music-note {
    animation: music-float var(--dur-2-8) ease-in-out infinite;
    opacity: 0;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="music"] .anim-music-base {
    animation: music-tilt var(--dur-2-8) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: 12px 14px;
  }
  .icon-card[data-animation="music"] .anim-music-note-2 { animation-delay: calc(var(--dur-2-8) / 2); }
  .icon-card[data-animation="lightning"] .icon-preview svg {
    animation: lightning-pulse var(--dur-1-8) ease-in-out infinite;
    transform-box: view-box;
    transform-origin: center;
  }
  .icon-card[data-animation="lightning"] .anim-lightning {
    animation: lightning-flash var(--dur-2-4) ease-in-out infinite;
  }
  .icon-card[data-animation="pencil"] .anim-pencil { animation: pencil-write var(--dur-5-0) ease-in-out infinite; transform-box: view-box; transform-origin: 13px 12px; }
  .icon-card[data-animation="pencil"] .anim-pencil-trace {
    animation: pencil-trace var(--dur-5-0) ease-in-out infinite;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
  }
  .icon-card[data-animation="eye"] .anim-eye-shape { animation: eye-blink var(--dur-2-8) ease-in-out infinite; transform-box: view-box; transform-origin: 12px 12px; }
  .icon-card[data-animation="eye"] .anim-eye-pupil { animation: eye-pupil-blink var(--dur-2-8) ease-in-out infinite; transform-box: view-box; transform-origin: center; }
  .icon-card[data-animation="bell"] .anim-bell { animation: bell-rattle var(--dur-4-0) cubic-bezier(0.25, 0.75, 0.2, 1) infinite; transform-box: view-box; transform-origin: 12px 4px; }
  .icon-card[data-animation="bell"] .anim-bell-clapper { animation: bell-clapper var(--dur-4-0) linear infinite; transform-box: view-box; transform-origin: 12px 17px; }
  .icon-card[data-animation="pin"] .anim-pin-ripple {
    animation: pin-ripple var(--dur-2-5) ease-out infinite;
    opacity: 0;
  }
  .icon-card[data-animation="pin"] .anim-pin-ripple-2 { animation-delay: calc(var(--dur-2-5) / 3); }

<body>
<main>
<div class="brand-banner-shell">
    <!-- 漂浮粒子已移除:canvas 不渲染。JS 里所有粒子逻辑都有 particleCanvas 空值保护,
         元素不在则整套粒子系统自动停用,无需改脚本。 -->
    <div class="brand-banner" aria-label="VIBEDESIGN"><div class="brand-banner-grid" id="brand-banner-grid"></div></div>
  </div>
<script>

  (() => {
    const base = [
      "*   * *** ***  **** ***  **** **** ***  **** *   *",
      "*   *  *  *  * *    *  * *    *     *  *     **  *",
      "*   *  *  *  * *    *  * *    *     *  *     * * *",
      "*   *  *  ***  **** *  * **** ****  *  * *** *  **",
      " * *   *  *  * *    *  * *       *  *  *   * *   *",
      " * *   *  *  * *    *  * *       *  *  *   * *   *",
      "  *   *** ***  **** ***  **** **** ***  **** *   *",
    ];
    const COL_SCALE = 2;
    const ROW_SCALE = 3;
    const expanded = [];
    for (const row of base) {
      const wide = Array.from(row, ch => ch.repeat(COL_SCALE)).join('');
      for (let v = 0; v < ROW_SCALE; v++) expanded.push(wide);
    }
    const lh = expanded.length;
    const lw = expanded[0].length;
    const padCols = 6;
    const padRows = 3;
    const cols = lw + padCols * 2;
    const rows = lh + padRows * 2;
    const colOff = padCols;
    const rowOff = padRows;

    const grid = document.getElementById('brand-banner-grid');
    if (!grid) return;
    const banner = grid.parentElement;
    const bannerShell = grid.closest('.brand-banner-shell');
    const bannerDownloadButton = document.getElementById('banner-download');
    const particleCanvas = document.getElementById('brand-particle-canvas');
    const particleCtx = particleCanvas ? particleCanvas.getContext('2d') : null;

    const isLetter = (r, c) => {
      const lr = r - rowOff, lc = c - colOff;
      return lr >= 0 && lr < lh && lc >= 0 && lc < lw && expanded[lr][lc] === '*';
    };

    // Chebyshev distance from (r,c) to the nearest letter cell, capped at 5.
    // Returned value drives the halo density gradient (closer cells = denser).
    const MAX_HALO = 4;
    const distToLetter = (r, c) => {
      for (let d = 1; d <= MAX_HALO; d++) {
        for (let dr = -d; dr <= d; dr++) {
          for (let dc = -d; dc <= d; dc++) {
            if (Math.max(Math.abs(dr), Math.abs(dc)) !== d) continue;
            if (isLetter(r + dr, c + dc)) return d;
          }
        }
      }
      return Infinity;
    };

    // Each STYLE describes how the banner renders one variant.
    // densityByDist: probability of drawing an accent dot at each Chebyshev
    // distance from the nearest letter cell — lets a style fade out smoothly.
    //   ascii / block: flat halo within 2 cells (binary near/far feel)
    //   dots: halftone gradient (1→2→3→4 cells = 0.72 → 0.45 → 0.22 → 0.08)
    // Cells beyond MAX_HALO fall back to ambientDensity.
    const pick = arr => () => arr[Math.floor(Math.random() * arr.length)];
    const BRAND_TEXT = 'VIBEDESIGN';
    const ASCII_PALETTE = ['#0b132b', '#1c7c54', '#f05d5e', '#f2c14e', '#5b5fef'];
    const BLOCK_PALETTE = ['#ff4d6d', '#ff9f1c', '#18a058', '#2478ff', '#7b45d8'];
    const BLOCK_DECOR_PALETTE = ['#ffb8c6', '#ffd19a', '#9fdfc0', '#adcaff', '#c9b8f2'];
    const DOT_PALETTE = ['#ff0044', '#ff7a00', '#00a676', '#006dff', '#8c3dff'];
    const STYLES = [
      {
        id: 'ascii',
        kind: 'pixel',
        letter: () => '*',
        accent: () => '\\',
        ambient: pick(['*', '\\']),
        densityByDist: { 1: 0.28, 2: 0.28 },
        ambientDensity: 0.015,
        backgroundColor: '#C3C0FA',
        lineHeight: '0.65',
        letterSpacing: '0',
        letterColor: () => '#CDD107',
        decorationColor: () => '#CDD107',
      },
      {
        id: 'block',
        kind: 'pixel',
        letter: () => '▄',
        accent: pick(['▀', '▄']),
        ambient: pick(['▀', '▄']),
        densityByDist: { 1: 0.18, 2: 0.18 },
        ambientDensity: 0.012,
        backgroundColor: '#90E5B4',
        lineHeight: '0.65',
        letterSpacing: '0',
        letterColor: () => '#5B69E4',
        decorationColor: () => '#5B69E4',
      },
      {
        id: 'dots',
        kind: 'pixel',
        letter: () => '•',
        accent: () => '•',
        // Weighted pool: ~36% dots + sparkles / squares / triangles
        // mixed in more aggressively for decorative density.
        ambient: pick(['•', '•', '•', '•', '✦', '✦', '✦', '▪', '▪', '▴', '▴']),
        densityByDist: {},
        ambientDensity: 0.038,
        backgroundColor: '#CFFA58',
        lineHeight: '0.65',
        letterSpacing: '0',
        letterColor: () => '#2E8FE5',
        decorationColor: () => '#2E8FE5',
      },
    ];
    // 切换节奏:三套样式等速轮播,每套停留 1 秒
    const FAST_MS = 1000;
    const HOLD_MS = 1000;
    const PARTICLE_TOP = { r: 255, g: 38, b: 132 };
    const PARTICLE_MID = { r: 255, g: 116, b: 176 };
    const PARTICLE_BOTTOM = { r: 155, g: 72, b: 244 };
    let particles = [];
    let particleWidth = 0;
    let particleHeight = 0;
    let particleTime = 0;
    let lastParticleFrame = performance.now();

    const lerp = (a, b, t) => a + (b - a) * t;
    const clamp01 = value => Math.max(0, Math.min(1, value));
    const mixRgb = (from, to, t) => ({
      r: Math.round(lerp(from.r, to.r, t)),
      g: Math.round(lerp(from.g, to.g, t)),
      b: Math.round(lerp(from.b, to.b, t)),
    });
    const getParticleRgb = y => {
      const t = clamp01(y / Math.max(1, particleHeight));
      return t < 0.56
        ? mixRgb(PARTICLE_TOP, PARTICLE_MID, t / 0.56)
        : mixRgb(PARTICLE_MID, PARTICLE_BOTTOM, (t - 0.56) / 0.44);
    };
    const rgbToCss = ({ r, g, b }, alpha = 1) => `rgba(${r}, ${g}, ${b}, ${alpha})`;
    const particleRand = index => {
      const value = Math.sin((index + 1) * 91.345 + 17.31) * 43758.5453;
      return value - Math.floor(value);
    };

    const createParticles = () => {
      if (!particleCanvas || !particleWidth || !particleHeight) return;
      const count = Math.min(2600, Math.max(1200, Math.round((particleWidth * particleHeight) / 250)));
      const centerX = particleWidth / 2;
      const centerY = particleHeight * 0.55;
      const radiusX = particleWidth * 0.39;
      const radiusY = particleHeight * 0.36;
      particles = Array.from({ length: count }, (_, index) => {
        const angle = Math.random() * Math.PI * 2;
        const band = 0.72 + Math.random() * 0.54;
        const shell = Math.random() < 0.34 ? 0.78 + Math.random() * 0.22 : band;
        const jitter = (Math.random() - 0.5) * 42;
        const baseX = centerX + Math.cos(angle) * radiusX * shell + Math.cos(angle + Math.PI / 2) * jitter;
        const baseY = centerY + Math.sin(angle) * radiusY * shell + Math.sin(angle + Math.PI / 2) * jitter;
        return {
          baseX,
          baseY,
          angle,
          size: 0.55 + Math.random() * 1.35,
          alpha: 0.16 + Math.random() * 0.46,
          pulse: 0.18 + Math.random() * 0.4,
          drift: 1.8 + Math.random() * 5.8,
          speed: 0.32 + Math.random() * 0.72,
          phase: particleRand(index) * Math.PI * 2,
        };
      });
    };

    const resizeParticleCanvas = () => {
      if (!particleCanvas || !particleCtx || !bannerShell) return;
      const rect = bannerShell.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      particleWidth = Math.max(1, Math.round(rect.width));
      particleHeight = Math.max(1, Math.round(rect.height));
      const canvasWidth = Math.round(particleWidth * dpr);
      const canvasHeight = Math.round(particleHeight * dpr);
      if (particleCanvas.width !== canvasWidth || particleCanvas.height !== canvasHeight) {
        particleCanvas.width = canvasWidth;
        particleCanvas.height = canvasHeight;
        particleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        createParticles();
      }
    };

    const getParticleState = particle => {
      const flow = particleTime * particle.speed + particle.phase;
      const tangentX = Math.cos(particle.angle + Math.PI / 2);
      const tangentY = Math.sin(particle.angle + Math.PI / 2);
      const radialX = Math.cos(particle.angle);
      const radialY = Math.sin(particle.angle);
      const x = particle.baseX
        + tangentX * Math.sin(flow) * particle.drift
        + radialX * Math.cos(flow * 0.73) * particle.drift * 0.38;
      const y = particle.baseY
        + tangentY * Math.sin(flow) * particle.drift
        + radialY * Math.cos(flow * 0.73) * particle.drift * 0.38;
      const alpha = particle.alpha * (0.72 + Math.sin(flow * 1.8) * particle.pulse);
      return {
        x,
        y,
        size: particle.size,
        alpha: Math.max(0.04, Math.min(0.82, alpha)),
        color: getParticleRgb(y),
      };
    };

    const drawParticles = now => {
      if (!particleCanvas || !particleCtx) return;
      resizeParticleCanvas();
      const dt = Math.min(0.05, (now - lastParticleFrame) / 1000);
      lastParticleFrame = now;
      particleTime += dt;
      particleCtx.clearRect(0, 0, particleWidth, particleHeight);
      particles.forEach(particle => {
        const point = getParticleState(particle);
        particleCtx.fillStyle = rgbToCss(point.color, point.alpha);
        particleCtx.beginPath();
        particleCtx.arc(point.x, point.y, point.size, 0, Math.PI * 2);
        particleCtx.fill();
      });
      requestAnimationFrame(drawParticles);
    };

    const cell = (cls, text, maxDelay, color) => {
      const s = document.createElement('span');
      s.className = cls;
      s.style.setProperty('--d', (Math.random() * maxDelay).toFixed(2) + 's');
      if (color) s.style.color = color;
      s.textContent = text;
      return s;
    };

    function build(style) {
      if (style.kind === 'font') {
        const span = document.createElement('span');
        span.className = 'brand-text';
        span.textContent = style.text;
        return span;
      }
      const frag = document.createDocumentFragment();
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (isLetter(r, c)) {
            const color = style.letterColor ? style.letterColor(r, c) : null;
            frag.appendChild(cell('px-letter', style.letter(), 2.6, color));
            continue;
          }
          const d = distToLetter(r, c);
          const haloDensity = style.densityByDist[d];
          if (haloDensity !== undefined) {
            if (Math.random() < haloDensity) {
              const color = style.decorationColor ? style.decorationColor(r, c, d) : null;
              frag.appendChild(cell('px-accent', style.accent(), 3.6, color));
            } else {
              frag.appendChild(document.createTextNode(' '));
            }
          } else if (Math.random() < style.ambientDensity) {
            const color = style.decorationColor ? style.decorationColor(r, c, d) : null;
            frag.appendChild(cell('px-star', style.ambient(), 3.6, color));
          } else {
            frag.appendChild(document.createTextNode(' '));
          }
        }
        if (r < rows - 1) frag.appendChild(document.createTextNode('\n'));
      }
      return frag;
    }

    let activeStyle = null;
    let pointerState = null;
    let scatterFrame = 0;
    let pixelOrigins = [];
    let originsDirty = true;
    const SCATTER_RADIUS = 82.5;
    const SCATTER_FORCE = 72.5;
    const SCATTER_MIN_FORCE = 10;
    const PIXEL_SELECTOR = '.px-letter, .px-accent, .px-star';
    let settleTimer = 0;

    const measurePixelOrigins = () => {
      pixelOrigins = Array.from(grid.querySelectorAll(PIXEL_SELECTOR)).map(el => {
        const rect = el.getBoundingClientRect();
        return {
          el,
          x: rect.left + rect.width / 2,
          y: rect.top + rect.height / 2,
        };
      });
      originsDirty = false;
    };

    const resetSand = () => {
      grid.querySelectorAll(PIXEL_SELECTOR).forEach(el => {
        el.style.removeProperty('--sand-x');
        el.style.removeProperty('--sand-y');
        el.style.removeProperty('--sand-rot');
      });
    };

    const scatterPixels = () => {
      scatterFrame = 0;
      if (!pointerState || !activeStyle || activeStyle.kind !== 'pixel') return;
      if (originsDirty) measurePixelOrigins();
      grid.style.setProperty('--sand-letter-duration', '0.34s');
      grid.style.setProperty('--sand-decor-duration', '0.42s');
      pixelOrigins.forEach(({ el, x: originX, y: originY }, i) => {
        const dx = originX - pointerState.x;
        const dy = originY - pointerState.y;
        const dist = Math.hypot(dx, dy);
        if (dist > SCATTER_RADIUS) {
          return;
        }
        const raw = 1 - dist / SCATTER_RADIUS;
        const strength = Math.pow(raw, 0.9);
        const seed = Math.sin((i + 1) * 12.9898) * 43758.5453;
        const seedA = seed - Math.floor(seed);
        const seedB = Math.sin((i + 1) * 78.233) * 24634.6345;
        const seedBFrac = seedB - Math.floor(seedB);
        const seedC = Math.sin((i + 1) * 41.337) * 12741.923;
        const seedCFrac = seedC - Math.floor(seedC);
        const jitter = (seedA - 0.5) * 2.15;
        const spread = 0.72 + seedBFrac * 0.95;
        const baseAngle = dist > 1 ? Math.atan2(dy, dx) : seed;
        const angle = baseAngle + jitter;
        const isDecor = !el.classList.contains('px-letter');
        const force = (SCATTER_MIN_FORCE + SCATTER_FORCE * strength) * spread * (isDecor ? 1.18 : 1);
        const tangent = (seedCFrac - 0.5) * SCATTER_FORCE * strength * 0.34;
        const offsetX = Math.cos(angle) * force + Math.cos(angle + Math.PI / 2) * tangent;
        const offsetY = Math.sin(angle) * force + Math.sin(angle + Math.PI / 2) * tangent;
        const rot = (jitter * 34 + (seedCFrac - 0.5) * 46) * strength;
        el.style.setProperty('--sand-x', `${offsetX.toFixed(1)}px`);
        el.style.setProperty('--sand-y', `${offsetY.toFixed(1)}px`);
        el.style.setProperty('--sand-rot', `${rot.toFixed(1)}deg`);
      });
    };

    const requestScatter = event => {
      if (!activeStyle || activeStyle.kind !== 'pixel') return;
      pointerState = { x: event.clientX, y: event.clientY };
      if (!scatterFrame) scatterFrame = requestAnimationFrame(scatterPixels);
    };

    const settleSand = () => {
      pointerState = null;
      clearTimeout(settleTimer);
      if (scatterFrame) {
        cancelAnimationFrame(scatterFrame);
        scatterFrame = 0;
      }
      grid.style.setProperty('--sand-letter-duration', '1.65s');
      grid.style.setProperty('--sand-decor-duration', '1.95s');
      resetSand();
      settleTimer = setTimeout(() => {
        grid.style.removeProperty('--sand-letter-duration');
        grid.style.removeProperty('--sand-decor-duration');
      }, 2000);
    };

    const trimSvgNumber = value => String(Math.round(value * 100) / 100);
    const escapeXml = value => String(value).replace(/[&<>"']/g, ch => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&apos;',
    }[ch]));

    const makeOpacityAttr = opacity => {
      const parsed = Number(opacity);
      return Number.isFinite(parsed) && parsed < 0.99 ? ` opacity="${trimSvgNumber(parsed)}"` : '';
    };

    const appendTextNode = (parts, {
      text,
      x,
      y,
      fill,
      opacity = 1,
      fontFamily,
      fontSize,
      fontWeight,
      fontStyle,
      letterSpacing,
      transform,
      stroke,
      strokeWidth,
      textAnchor = 'middle',
      dominantBaseline = 'middle',
    }) => {
      const attrs = [
        `x="${trimSvgNumber(x)}"`,
        `y="${trimSvgNumber(y)}"`,
        `fill="${escapeXml(fill)}"`,
        `font-family="${escapeXml(fontFamily)}"`,
        `font-size="${trimSvgNumber(fontSize)}"`,
        `font-weight="${escapeXml(fontWeight)}"`,
        `text-anchor="${textAnchor}"`,
        `dominant-baseline="${dominantBaseline}"`,
      ];
      if (fontStyle && fontStyle !== 'normal') attrs.push(`font-style="${escapeXml(fontStyle)}"`);
      if (letterSpacing && letterSpacing !== 'normal') attrs.push(`letter-spacing="${escapeXml(letterSpacing)}"`);
      if (transform) attrs.push(`transform="${escapeXml(transform)}"`);
      if (stroke) attrs.push(`stroke="${escapeXml(stroke)}"`, `stroke-width="${trimSvgNumber(strokeWidth)}"`, 'paint-order="stroke"');
      const opacityAttr = makeOpacityAttr(opacity);
      parts.push(`<text ${attrs.join(' ')}${opacityAttr}>${escapeXml(text)}</text>`);
    };

    const withStablePixelLayout = callback => {
      const pixels = Array.from(grid.querySelectorAll(PIXEL_SELECTOR));
      const previousTransitions = pixels.map(el => el.style.transition);
      pixels.forEach(el => {
        el.style.transition = 'none';
        el.style.removeProperty('--sand-x');
        el.style.removeProperty('--sand-y');
        el.style.removeProperty('--sand-rot');
      });
      grid.getBoundingClientRect();
      const result = callback();
      pixels.forEach((el, index) => {
        el.style.transition = previousTransitions[index];
      });
      return result;
    };

    const appendParticleBannerSvg = parts => {
      if (!particles.length) return;
      parts.push('<g id="background-particles">');
      particles.forEach(particle => {
        const point = getParticleState(particle);
        if (point.alpha <= 0.03) return;
        parts.push(
          `<circle cx="${trimSvgNumber(point.x)}" cy="${trimSvgNumber(point.y)}" r="${trimSvgNumber(point.size)}" fill="${rgbToCss(point.color)}" opacity="${trimSvgNumber(point.alpha)}"/>`
        );
      });
      parts.push('</g>');
    };

    const appendPixelBannerSvg = (parts, shellRect) => {
      const gridStyle = getComputedStyle(grid);
      const fontSize = parseFloat(gridStyle.fontSize) || 11;
      const fontFamily = gridStyle.fontFamily;
      const fontWeight = gridStyle.fontWeight || '700';
      const letterSpacing = gridStyle.letterSpacing;
      grid.querySelectorAll(PIXEL_SELECTOR).forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return;
        const style = getComputedStyle(el);
        appendTextNode(parts, {
          text: el.textContent,
          x: rect.left - shellRect.left + rect.width / 2,
          y: rect.top - shellRect.top + rect.height / 2,
          fill: style.color,
          opacity: style.opacity,
          fontFamily,
          fontSize,
          fontWeight,
          letterSpacing,
        });
      });
    };

    const appendFontBannerSvg = (parts, shellRect) => {
      const textEl = grid.querySelector('.brand-text');
      if (!textEl || !activeStyle) return;
      const rect = textEl.getBoundingClientRect();
      const gridStyle = getComputedStyle(grid);
      const textStyle = getComputedStyle(textEl);
      const fontSize = parseFloat(gridStyle.fontSize) || parseFloat(textStyle.fontSize) || 76;
      const fontFamily = gridStyle.fontFamily;
      const fontWeight = gridStyle.fontWeight || '700';
      const fontStyle = gridStyle.fontStyle || textStyle.fontStyle;
      const letterSpacing = gridStyle.letterSpacing;
      const cx = rect.left - shellRect.left + rect.width / 2;
      const cy = rect.top - shellRect.top + rect.height / 2;
      const text = activeStyle.id === 'mono' ? `[${BRAND_TEXT}]` : (activeStyle.text || BRAND_TEXT);
      const base = {
        text,
        x: 0,
        y: 0,
        fontFamily,
        fontSize,
        fontWeight,
        fontStyle,
        letterSpacing,
      };

      if (activeStyle.id === 'serif') {
        const transform = `translate(${trimSvgNumber(cx)} ${trimSvgNumber(cy)}) scale(0.94 1)`;
        appendTextNode(parts, { ...base, y: fontSize * 0.12, fill: '#905e3a', opacity: 0.18, transform });
        appendTextNode(parts, { ...base, x: fontSize * 0.035, y: fontSize * 0.035, fill: '#ffffff', opacity: 0.78, transform });
        appendTextNode(parts, { ...base, fill: '#211711', stroke: '#211711', strokeWidth: fontSize * 0.012, transform });
        return;
      }

      if (activeStyle.id === 'sans') {
        const transform = `translate(${trimSvgNumber(cx)} ${trimSvgNumber(cy)}) skewX(-8) scale(1 1.08)`;
        appendTextNode(parts, { ...base, x: fontSize * 0.06, fill: '#82a8ff', transform });
        appendTextNode(parts, { ...base, x: -fontSize * 0.06, fill: '#ff7d9d', transform });
        appendTextNode(parts, { ...base, y: fontSize * 0.09, fill: '#111111', opacity: 0.12, transform });
        appendTextNode(parts, { ...base, fill: '#111111', transform });
        return;
      }

      if (activeStyle.id === 'mono') {
        const left = rect.left - shellRect.left;
        const right = rect.right - shellRect.left;
        const top = rect.top - shellRect.top;
        const bottom = rect.bottom - shellRect.top;
        parts.push(`<line x1="${trimSvgNumber(left)}" y1="${trimSvgNumber(top)}" x2="${trimSvgNumber(right)}" y2="${trimSvgNumber(top)}" stroke="#101912" stroke-width="${trimSvgNumber(fontSize * 0.08)}" stroke-linecap="square"/>`);
        parts.push(`<line x1="${trimSvgNumber(left)}" y1="${trimSvgNumber(bottom)}" x2="${trimSvgNumber(right)}" y2="${trimSvgNumber(bottom)}" stroke="#101912" stroke-width="${trimSvgNumber(fontSize * 0.08)}" stroke-linecap="square"/>`);
        appendTextNode(parts, { ...base, fill: '#101912', transform: `translate(${trimSvgNumber(cx)} ${trimSvgNumber(cy)})` });
        return;
      }

      appendTextNode(parts, { ...base, fill: textStyle.color, opacity: textStyle.opacity, transform: `translate(${trimSvgNumber(cx)} ${trimSvgNumber(cy)})` });
    };

    const getBannerSvg = () => withStablePixelLayout(() => {
      const shellRect = bannerShell.getBoundingClientRect();
      const width = Math.max(1, Math.round(shellRect.width));
      const height = Math.max(1, Math.round(shellRect.height));
      const background = getComputedStyle(bannerShell).backgroundColor;
      const parts = [
        `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">`,
        `<rect width="${width}" height="${height}" fill="${escapeXml(background)}"/>`,
      ];
      appendParticleBannerSvg(parts);
      if (activeStyle && activeStyle.kind === 'pixel') {
        appendPixelBannerSvg(parts, shellRect);
      } else {
        appendFontBannerSvg(parts, shellRect);
      }
      parts.push('</svg>');
      return parts.join('');
    });

    const downloadBannerSvg = event => {
      event.preventDefault();
      event.stopPropagation();
      const svg = getBannerSvg();
      const blob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `vibedesign-banner-${activeStyle ? activeStyle.id : 'current'}.svg`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 0);
      if (typeof showToast === 'function') showToast('Banner SVG 已下载');
    };

    function applyStyle(style) {
      settleSand();
      activeStyle = style;
      // Reset inline overrides each time so pixel ⇄ font swaps don't leak styles.
      const reset = ['fontFamily', 'fontSize', 'fontWeight', 'fontStyle',
                     'letterSpacing', 'lineHeight', 'whiteSpace'];
      reset.forEach(prop => { grid.style[prop] = ''; });
      if (style.kind === 'font') {
        grid.style.fontFamily = style.fontFamily;
        grid.style.fontSize = style.fontSize;
        grid.style.fontWeight = style.fontWeight;
        if (style.fontStyle) grid.style.fontStyle = style.fontStyle;
        if (style.letterSpacing) grid.style.letterSpacing = style.letterSpacing;
        grid.style.lineHeight = style.lineHeight || '1';
        grid.style.whiteSpace = 'nowrap';
      } else {
        grid.style.lineHeight = style.lineHeight;
        grid.style.letterSpacing = style.letterSpacing;
      }
      grid.dataset.styleId = style.id;
      if (bannerShell) {
        bannerShell.style.setProperty('--brand-banner-bg', style.backgroundColor || '#C3C0FA');
      }
      grid.replaceChildren(build(style));
      originsDirty = true;
    }

    let idx = 0;
    let timer;
    const advance = () => {
      idx = (idx + 1) % STYLES.length;
      applyStyle(STYLES[idx]);
    };
    // 当前样式的停留时长:现在 FAST_MS = HOLD_MS = 1 秒,三套等速
    const stepDelay = () => (idx === STYLES.length - 1 ? HOLD_MS : FAST_MS);
    const scheduleAutoSwitch = () => {
      clearTimeout(timer);
      const tick = () => {
        advance();
        timer = setTimeout(tick, stepDelay());
      };
      timer = setTimeout(tick, stepDelay());
    };

    applyStyle(STYLES[idx]);
    scheduleAutoSwitch();
    if (particleCanvas && particleCtx) {
      resizeParticleCanvas();
      if ('ResizeObserver' in window) {
        new ResizeObserver(resizeParticleCanvas).observe(bannerShell);
      }
      requestAnimationFrame(drawParticles);
    }

    // Click VIBEDESIGN to jump to the next style and reset the auto-cycle timer.
    banner.addEventListener('pointermove', requestScatter);
    banner.addEventListener('pointerleave', settleSand);
    window.addEventListener('resize', () => {
      originsDirty = true;
      settleSand();
      resizeParticleCanvas();
    });
    if (bannerDownloadButton) {
      bannerDownloadButton.addEventListener('click', downloadBannerSvg);
    }
    banner.addEventListener('click', () => {
      advance();
      scheduleAutoSwitch();
    });
  })();
  
</script>
</main>
</body>
</html>
