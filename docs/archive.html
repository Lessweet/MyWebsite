<body class="home-v2 design-page no-banner menu-hidden works-page">
    <header class="header home-nav" id="site-nav" data-active="design"></header>
    <script>
        initSiteNav();
        applySiteTheme();   /* 首绘前应用记忆的深/浅色主题(nav-boot.js) */
        /* 首屏同步设定 --design-menu-top = 顶栏实际高度,避免刷新时内容「上跳」 */

            var h = document.getElementById('site-nav');
            if (h) document.documentElement.style.setProperty('--design-menu-top', h.offsetHeight + 'px');
        })();
    </script>
    <main class="design-layout" id="app"></main>
